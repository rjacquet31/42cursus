<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>R. Jacquet — Parcours 42</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Fond animé -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow bg-glow--1" aria-hidden="true"></div>
  <div class="bg-glow bg-glow--2" aria-hidden="true"></div>

  <!-- Panneau de description (suit la souris) -->
  <div class="info-card" id="infoCard" role="tooltip" aria-hidden="true">
    <div class="info-card__head">
      <span class="info-card__tag" id="infoTag">Projet</span>
      <h3 class="info-card__title" id="infoTitle"></h3>
    </div>
    <p class="info-card__desc" id="infoDesc"></p>
    <div class="info-card__foot">
      <span class="info-card__stack" id="infoStack"></span>
      <span class="info-card__link">Voir sur GitHub →</span>
    </div>
  </div>

  <header class="hero">
    <p class="hero__eyebrow">Holy Graph · École 42</p>
    <h1 class="hero__title">Mon parcours à <span>42</span></h1>
    <p class="hero__sub">
      Chaque carte est un projet du cursus, du tronc commun jusqu'à la spécialisation.
      Survolez un projet pour le découvrir, cliquez pour ouvrir le dépôt GitHub.
    </p>
    <div class="hero__stats" id="heroStats"></div>
  </header>

  <main class="board" id="board"></main>

  <footer class="footer">
    <p>R. Jacquet · Cursus 42 · <a href="https://github.com/rjacquet31" target="_blank" rel="noopener">github.com/rjacquet31</a></p>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
